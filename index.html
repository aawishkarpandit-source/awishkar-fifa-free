<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="screen-orientation" content="any">
  <meta name="theme-color" content="#0a0a0a">
  <title>FIFA Live - Made by Awishkar</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23e94560'/%3E%3Cstop offset='100%25' stop-color='%230f3460'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='48' fill='url(%23g)'/%3E%3Ctext x='50' y='68' font-size='55' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'%3EF%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(233,69,96,0.08) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 20%, rgba(15,52,96,0.1) 0%, transparent 50%),
                  radial-gradient(ellipse at 50% 80%, rgba(233,69,96,0.05) 0%, transparent 50%);
      z-index: 0;
      animation: bgShift 20s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      0% { opacity: 0.6; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.1); }
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(17,24,39,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(233,69,96,0.3);
      transform: translateY(-100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
      opacity: 0;
    }
    body:hover header,
    body.show-ui header {
      transform: translateY(0);
      opacity: 1;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; color: #fff;
    }

    .logo-text { display: flex; flex-direction: column; gap: 1px; }
    .logo-text h1 {
      font-size: 1.15rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1.1;
    }
    .logo-text h1 span {
      background: linear-gradient(135deg, #e94560, #ff6b81);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .logo-text small {
      font-size: 0.6rem; font-weight: 500; color: #6b7280;
      letter-spacing: 0.05em; text-transform: uppercase;
    }

    .badge {
      background: linear-gradient(135deg, #e94560, #c23152);
      color: #fff; font-size: 0.6rem; font-weight: 700;
      padding: 4px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.1em;
      display: flex; align-items: center; gap: 5px;
      box-shadow: 0 0 20px rgba(233,69,96,0.4);
    }
    .badge::before {
      content: ''; width: 6px; height: 6px; background: #fff; border-radius: 50%;
      animation: dotPulse 1.5s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    #match-info {
      position: fixed;
      top: 56px; left: 0; right: 0;
      z-index: 99;
      background: rgba(17,24,39,0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 8px 20px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(31,41,55,0.5);
      overflow: hidden;
      transform: translateY(-100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1) 0.1s, opacity 0.4s ease 0.1s;
      opacity: 0;
    }
    body:hover #match-info,
    body.show-ui #match-info {
      transform: translateY(0);
      opacity: 1;
    }
    #match-info .live-dot {
      width: 8px; height: 8px; background: #ef4444; border-radius: 50%;
      flex-shrink: 0; box-shadow: 0 0 10px rgba(239,68,68,0.6);
      animation: dotPulse 1.5s ease-in-out infinite;
    }
    #match-title {
      font-weight: 600; font-size: 0.9rem; color: #f3f4f6;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    #match-comp {
      font-size: 0.7rem; color: #6b7280; margin-left: auto;
      white-space: nowrap; flex-shrink: 0; padding: 2px 8px;
      background: rgba(31,41,55,0.5); border-radius: 4px;
    }

    .video-wrap {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #000; z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-wrap iframe {
      width: 100vw;
      max-height: 100vh;
      aspect-ratio: 16 / 9;
      border: none;
    }

    .rotate-hint {
      position: fixed;
      bottom: 70px; right: 16px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(10px);
      color: #fff; font-size: 0.7rem; font-weight: 500;
      padding: 8px 12px; border-radius: 10px;
      display: none; align-items: center; gap: 6px;
      z-index: 101; pointer-events: none;
      border: 1px solid rgba(255,255,255,0.1);
      animation: bounceHint 2s ease-in-out infinite;
    }
    @keyframes bounceHint {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .rotate-hint svg {
      width: 16px; height: 16px;
      animation: rotateIcon 2s ease-in-out infinite;
    }
    @keyframes rotateIcon {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(90deg); }
      75% { transform: rotate(-90deg); }
    }
    @media (max-width: 768px) and (orientation: portrait) {
      .rotate-hint { display: flex; }
    }

    footer {
      position: fixed;
      bottom: 8px; left: 50%;
      transform: translateX(-50%) translateY(120%);
      z-index: 101;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      text-align: center; padding: 4px 12px;
      font-size: 0.6rem; color: #6b7280;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
      white-space: nowrap;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.5s, opacity 0.6s ease 0.5s;
      opacity: 0;
    }
    body:hover footer,
    body.show-ui footer {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    footer span {
      background: linear-gradient(135deg, #e94560, #ff6b81);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      font-weight: 700;
    }

    @media (max-width: 380px) {
      header { padding: 8px 12px; }
      .logo-icon { width: 30px; height: 30px; font-size: 0.85rem; border-radius: 8px; }
      .logo-text h1 { font-size: 0.95rem; }
      .logo-text small { font-size: 0.55rem; }
      .badge { font-size: 0.5rem; padding: 3px 7px; }
      #match-info { top: 48px; padding: 6px 12px; }
      #match-title { font-size: 0.78rem; }
      #match-comp { font-size: 0.6rem; padding: 2px 6px; }
      footer { padding: 3px 8px; font-size: 0.5rem; }
    }

    @media (max-width: 480px) {
      header { padding: 8px 14px; }
      .logo-icon { width: 32px; height: 32px; font-size: 0.9rem; }
      .logo-text h1 { font-size: 1rem; }
      .badge { font-size: 0.55rem; padding: 3px 8px; }
      #match-info { top: 50px; padding: 7px 14px; }
      #match-title { font-size: 0.82rem; }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      header { padding: 4px 12px; }
      .logo-icon { width: 24px; height: 24px; font-size: 0.7rem; border-radius: 6px; }
      .logo-text h1 { font-size: 0.8rem; }
      .logo-text small { font-size: 0.5rem; }
      .badge { font-size: 0.45rem; padding: 2px 5px; }
      #match-info { top: 34px; padding: 3px 12px; }
      #match-title { font-size: 0.7rem; }
      #match-comp { font-size: 0.6rem; }
      footer { padding: 2px 6px; font-size: 0.45rem; }
      .rotate-hint { display: none !important; }
    }

    @media (min-width: 600px) {
      header { padding: 12px 24px; }
      .logo-icon { width: 38px; height: 38px; font-size: 1.05rem; }
      .logo-text h1 { font-size: 1.25rem; }
      .logo-text small { font-size: 0.65rem; }
      .badge { font-size: 0.65rem; padding: 4px 12px; }
      #match-info { top: 60px; padding: 10px 24px; }
      #match-title { font-size: 1rem; }
      #match-comp { font-size: 0.8rem; }
      footer { padding: 5px 14px; font-size: 0.6rem; }
    }

    @media (min-width: 768px) {
      header { padding: 14px 32px; }
      .logo-icon { width: 42px; height: 42px; font-size: 1.15rem; border-radius: 12px; }
      .logo-text h1 { font-size: 1.4rem; }
      .logo-text small { font-size: 0.7rem; }
      .badge { font-size: 0.7rem; padding: 5px 14px; }
      #match-info { top: 68px; padding: 12px 32px; }
      #match-title { font-size: 1.1rem; }
      #match-comp { font-size: 0.85rem; }
      footer { padding: 12px; font-size: 0.8rem; }
    }

    @media (min-width: 1024px) {
      header { padding: 16px 48px; }
      .logo-icon { width: 46px; height: 46px; font-size: 1.25rem; }
      .logo-text h1 { font-size: 1.55rem; }
      #match-info { top: 76px; padding: 14px 48px; }
      #match-title { font-size: 1.2rem; }
      #match-comp { font-size: 0.9rem; }
      footer { padding: 5px 16px; font-size: 0.65rem; }
    }

    @media (hover: hover) {
      .badge:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(233,69,96,0.6); }
      .logo-icon:hover { transform: scale(1.1) rotate(5deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">F</div>
      <div class="logo-text">
        <h1>FIFA <span>LIVE</span></h1>
        <small>Made by Awishkar</small>
      </div>
    </div>
    <div class="badge">LIVE</div>
  </header>

  <div id="match-info">
    <span class="live-dot"></span>
    <span id="match-title">Fetching current match…</span>
    <span id="match-comp"></span>
  </div>

  <div class="video-wrap" id="videoWrap">
    <iframe src="https://vileembeds.pages.dev/embed/fox-usa#player=clappr&autoplay=1" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>
  </div>

  <div class="rotate-hint" id="rotateHint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <polyline points="1 20 1 14 7 14"></polyline>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
    </svg>
    Rotate for fullscreen
  </div>

  <footer>Made by <span>Awishkar</span></footer>

  <script>
    async function fetchMatch() {
      try {
        const res = await fetch("https://site.api.espn.com/apis/site/v2/sports/soccer/all/scoreboard");
        const data = await res.json();
        const events = data.events || [];
        const live = events.find(e => e.status && e.status.type && e.status.type.state === "in");
        const upcoming = events.find(e => e.status && e.status.type && e.status.type.state === "pre");
        const recent = events.find(e => e.status && e.status.type && e.status.type.state === "post");
        const match = live || upcoming || recent;
        if (match) {
          const titleEl = document.getElementById("match-title");
          const compEl = document.getElementById("match-comp");
          titleEl.style.animation = "none";
          titleEl.offsetHeight;
          titleEl.style.animation = "fadeIn 0.4s ease forwards";
          titleEl.textContent = match.name || "FIFA Live Match";
          compEl.textContent = match.season ? match.season.slug : "";
        } else {
          document.getElementById("match-title").textContent = "FIFA Live Match";
        }
      } catch (e) {
        document.getElementById("match-title").textContent = "FIFA Live Match";
      }
    }
    fetchMatch();
    setInterval(fetchMatch, 30000);

    const videoWrap = document.getElementById("videoWrap");

    async function lockLandscape() {
      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock("landscape");
        }
      } catch (e) {}
    }

    document.addEventListener("fullscreenchange", function () {
      if (document.fullscreenElement) {
        lockLandscape();
        document.body.classList.add("show-ui");
      } else {
        document.body.classList.remove("show-ui");
      }
    });
    document.addEventListener("webkitfullscreenchange", function () {
      if (document.webkitFullscreenElement) {
        lockLandscape();
        document.body.classList.add("show-ui");
      } else {
        document.body.classList.remove("show-ui");
      }
    });

    let hideTimer;
    document.addEventListener("mousemove", function () {
      document.body.classList.add("show-ui");
      clearTimeout(hideTimer);
      hideTimer = setTimeout(function () {
        document.body.classList.remove("show-ui");
      }, 2500);
    });

    videoWrap.addEventListener("click", function (e) {
      if (e.target.tagName === "IFRAME") return;
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (videoWrap.requestFullscreen) videoWrap.requestFullscreen();
        else if (videoWrap.webkitRequestFullscreen) videoWrap.webkitRequestFullscreen();
      }
    });
  </script>
</body>
</html>
