<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="screen-orientation" content="any">
  <title>FIFA Live - Made by Awishkar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; }
    header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #e94560; flex-shrink: 0; }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo svg { width: 28px; height: 28px; }
    .logo h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 1px; }
    .logo h1 span { color: #e94560; }
    .badge { background: #e94560; color: #fff; font-size: 0.6rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    #match-info { background: #111827; padding: 8px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #1f2937; min-height: 40px; flex-shrink: 0; overflow: hidden; }
    #match-info .live-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; flex-shrink: 0; }
    #match-title { font-weight: 600; font-size: 0.9rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #match-comp { font-size: 0.75rem; color: #9ca3af; margin-left: auto; white-space: nowrap; flex-shrink: 0; }
    .video-wrap { flex: 1; position: relative; background: #000; min-height: 0; cursor: pointer; }
    .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    .rotate-hint { position: absolute; bottom: 60px; right: 16px; background: rgba(0,0,0,0.7); color: #fff; font-size: 0.7rem; padding: 6px 10px; border-radius: 6px; display: none; align-items: center; gap: 6px; z-index: 10; pointer-events: none; }
    .rotate-hint svg { width: 16px; height: 16px; }
    @media (max-width: 768px) and (orientation: portrait) { .rotate-hint { display: flex; } }
    footer { background: #111827; text-align: center; padding: 8px; font-size: 0.7rem; color: #6b7280; border-top: 1px solid #1f2937; flex-shrink: 0; }
    footer span { color: #e94560; font-weight: 600; }

    @media (max-width: 480px) {
      header { padding: 8px 12px; }
      .logo svg { width: 24px; height: 24px; }
      .logo h1 { font-size: 0.95rem; }
      .badge { font-size: 0.55rem; padding: 2px 6px; }
      #match-info { padding: 6px 12px; min-height: 36px; }
      #match-title { font-size: 0.8rem; }
      #match-comp { font-size: 0.7rem; }
      footer { padding: 6px; font-size: 0.65rem; }
    }

    @media (orientation: landscape) and (max-height: 500px) {
      header { padding: 4px 12px; }
      .logo svg { width: 20px; height: 20px; }
      .logo h1 { font-size: 0.85rem; }
      .badge { font-size: 0.5rem; padding: 2px 5px; }
      #match-info { padding: 4px 12px; min-height: 28px; gap: 6px; }
      #match-title { font-size: 0.75rem; }
      #match-comp { font-size: 0.65rem; }
      footer { padding: 3px; font-size: 0.6rem; }
    }

    @media (min-width: 768px) {
      header { padding: 14px 32px; }
      .logo svg { width: 36px; height: 36px; }
      .logo h1 { font-size: 1.5rem; }
      #match-info { padding: 12px 32px; min-height: 48px; }
      #match-title { font-size: 1.1rem; }
      #match-comp { font-size: 0.9rem; }
      footer { padding: 12px; font-size: 0.8rem; }
    }

    @media (min-width: 1024px) {
      header { padding: 16px 48px; }
      #match-info { padding: 14px 48px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <h1>FIFA <span>LIVE</span> <small style="font-size:0.5em;font-weight:400;color:#9ca3af;">Made by Awishkar</small></h1>
    </div>
    <div class="badge">● LIVE</div>
  </header>
  <div id="match-info">
    <span class="live-dot"></span>
    <span id="match-title">Fetching current match…</span>
    <span id="match-comp"></span>
  </div>
  <div class="video-wrap" id="videoWrap">
    <iframe src="https://vileembeds.pages.dev/embed/fox-usa#player=clappr&autoplay=1" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>
    <div class="rotate-hint" id="rotateHint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
      Rotate for fullscreen
    </div>
  </div>
  <footer>Made by <span>Awishkar</span></footer>

  <script>
    async function fetchMatch() {
      try {
        const res = await fetch("https://site.api.espn.com/apis/site/v2/sports/soccer/all/scoreboard");
        const data = await res.json();
        const events = data.events || [];
        const live = events.find(e => e.status && e.status.type && e.status.type.state === "in");
        const upcoming = events.find(e => e.status && e.status.type && e.status.type.state === "pre");
        const recent = events.find(e => e.status && e.status.type && e.status.type.state === "post");
        const match = live || upcoming || recent;
        if (match) {
          document.getElementById("match-title").textContent = match.name || "FIFA Live Match";
          const league = match.season ? match.season.slug : "";
          document.getElementById("match-comp").textContent = league;
        } else {
          document.getElementById("match-title").textContent = "FIFA Live Match";
        }
      } catch (e) {
        document.getElementById("match-title").textContent = "FIFA Live Match";
      }
    }
    fetchMatch();
    setInterval(fetchMatch, 30000);

    const videoWrap = document.getElementById("videoWrap");
    const rotateHint = document.getElementById("rotateHint");

    async function lockLandscape() {
      try {
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock("landscape");
        }
      } catch (e) {}
    }

    document.addEventListener("fullscreenchange", function () {
      if (document.fullscreenElement) {
        lockLandscape();
      }
    });

    document.addEventListener("webkitfullscreenchange", function () {
      if (document.webkitFullscreenElement) {
        lockLandscape();
      }
    });

    videoWrap.addEventListener("click", function (e) {
      if (e.target.tagName === "IFRAME") return;
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        if (videoWrap.requestFullscreen) videoWrap.requestFullscreen();
        else if (videoWrap.webkitRequestFullscreen) videoWrap.webkitRequestFullscreen();
      }
    });
  </script>
</body>
</html>
