<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIFA Live Matches</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #e94560; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo svg { width: 32px; height: 32px; }
    .logo h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 1px; }
    .logo h1 span { color: #e94560; }
    .badge { background: #e94560; color: #fff; font-size: 0.65rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    #match-info { background: #111827; padding: 10px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #1f2937; min-height: 44px; }
    #match-info .live-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; flex-shrink: 0; }
    #match-title { font-weight: 600; font-size: 1rem; color: #fff; }
    #match-comp { font-size: 0.8rem; color: #9ca3af; margin-left: auto; }
    .video-wrap { flex: 1; position: relative; background: #000; min-height: 0; }
    .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    footer { background: #111827; text-align: center; padding: 10px; font-size: 0.75rem; color: #6b7280; border-top: 1px solid #1f2937; }
    footer span { color: #e94560; font-weight: 600; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <h1>FIFA <span>LIVE</span></h1>
    </div>
    <div class="badge">● LIVE</div>
  </header>
  <div id="match-info">
    <span class="live-dot"></span>
    <span id="match-title">Fetching current match…</span>
    <span id="match-comp"></span>
  </div>
  <div class="video-wrap">
    <iframe src="https://vileembeds.pages.dev/embed/fox-usa#player=clappr&autoplay=1" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>
  </div>
  <footer>Made by <span>Awishkar</span></footer>

  <script>
    async function fetchMatch() {
      try {
        const res = await fetch("https://www.scorebat.com/video-api/v3/feed/?token=MTk5MDhfMTcyMjYwODgwMF80ZjZhM2RiNDVk");
        const data = await res.json();
        const now = Date.now() / 1000;
        const live = data.response.find(m => m.date < now && now < m.date + 7200)
                  || data.response.find(m => m.date > now);
        if (live) {
          const t = live.title || "Live Match";
          const c = live.competition || "";
          document.getElementById("match-title").textContent = t;
          document.getElementById("match-comp").textContent = c;
        }
      } catch (e) {
        document.getElementById("match-title").textContent = "FIFA Live Match";
      }
    }
    fetchMatch();
    setInterval(fetchMatch, 60000);
  </script>
</body>
</html>
